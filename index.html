<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AR Meishi TechConnect</title>
    <link rel="stylesheet" href="./src/style.css" />
    <!-- data-cfasync="false": Cloudflare Rocket Loaderによる書き換えを防ぐ
         （書き換えられると xrloaded イベントが壊れてARが起動しない） -->
    <script src="./xrextras/xrextras.js" data-cfasync="false"></script>
    <script async src="./xr/xr.js" data-preload-chunks="slam" data-cfasync="false"></script>
  </head>
  <body>
    <canvas id="camerafeed"></canvas>
    <!-- スキャンガイド: マーカー未認識のあいだ表示（認識したら非表示） -->
    <div id="scan-overlay">
      <div class="scan-frame">
        <img src="./assets/meishi_front.png" alt="名刺マーカー" />
        <div class="scan-line"></div>
      </div>
      <p class="scan-text">名刺にかざしてください</p>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
